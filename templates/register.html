<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - 国内油价监控</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.register-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 40px 32px; width: 100%; max-width: 400px; }
.register-card h1 { font-size: 22px; color: #2c3e50; text-align: center; margin-bottom: 8px; }
.register-card .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 28px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #444; }
.form-group input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; transition: border-color 0.2s; }
.form-group input:focus { outline: none; border-color: #3498db; }
.form-group .hint { font-size: 12px; color: #999; margin-top: 4px; }
.btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.btn:hover { opacity: 0.9; }
.btn-primary { background: #27ae60; color: #fff; margin-bottom: 12px; }
.btn-secondary { background: #ecf0f1; color: #2c3e50; }
.links { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
.links a { color: #3498db; text-decoration: none; }
.msg { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
.msg.show { display: block; }
.msg.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
.msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
</style>
</head>
<body>
<div class="register-card">
    <h1>创建账号</h1>
    <p class="subtitle">注册后可在浏览器配置油价监控</p>
    <div id="msg-box" class="msg"></div>
    <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="2-20位，支持中文/字母/数字" autofocus>
        <div class="hint">用户名注册后不可修改</div>
    </div>
    <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="至少6位">
    </div>
    <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="password2" placeholder="再次输入密码">
    </div>
    <button class="btn btn-primary" onclick="doRegister()">立即注册</button>
    <button class="btn btn-secondary" onclick="location.href='/login'">已有账号？去登录</button>
    <div class="links">
        <p>每个账号可独立配置省份和推送方式</p>
    </div>
</div>
<script>
function showMsg(text, type) {
    const box = document.getElementById('msg-box');
    box.textContent = text;
    box.className = 'msg show ' + type;
    setTimeout(() => { box.className = 'msg'; }, 4000);
}
async function doRegister() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    if (!username || !password) {
        showMsg('请输入用户名和密码', 'error');
        return;
    }
    if (password.length < 6) {
        showMsg('密码长度至少6位', 'error');
        return;
    }
    if (password !== password2) {
        showMsg('两次输入的密码不一致', 'error');
        return;
    }
    try {
        const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
            showMsg('注册成功，正在跳转登录...', 'success');
            setTimeout(() => location.href = '/login', 800);
        } else {
            showMsg(data.error || '注册失败', 'error');
        }
    } catch (e) {
        showMsg('网络错误: ' + e.message, 'error');
    }
}
document.getElementById('password2').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doRegister();
});
</script>
</body>
</html>
